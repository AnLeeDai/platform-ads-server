server {
    listen __PORT__ default_server;
    listen [::]:__PORT__ default_server;

    server_name _;

    root /var/www/html/public;
    index index.php index.html index.htm;

    access_log /var/log/nginx/access.log;
    error_log /var/log/nginx/error.log;

    # Gửi file hiệu quả, quan trọng khi phục vụ video/static
    sendfile on;
    tcp_nopush on;
    tcp_nodelay on;

    keepalive_timeout 65;
    client_max_body_size 100M; # tăng nếu upload video lớn

    # Gzip cho text assets
    gzip on;
    gzip_types text/plain text/css application/json application/javascript application/xml+rss application/xml application/x-javascript;
    gzip_min_length 1024;

    # Cache static (css, js, images, video…) – video nếu public có thể cache
    location ~* \.(?:css|js|jpg|jpeg|gif|png|ico|svg|woff2?|ttf|otf|eot|mp4|webm|ogg|m3u8|ts)$ {
        expires 7d;
        add_header Cache-Control "public, max-age=604800, immutable";
        access_log off;
        try_files $uri =404;
    }

    location / {
        try_files $uri $uri/ /index.php?$query_string;
    }

    location ~ \.php$ {
        include fastcgi_params;
        fastcgi_pass 127.0.0.1:9000;
        fastcgi_index index.php;
        fastcgi_param SCRIPT_FILENAME $document_root$fastcgi_script_name;
        fastcgi_param PATH_INFO $fastcgi_path_info;

        # FastCGI buffers (giúp xử lý response lớn mượt hơn)
        fastcgi_buffers 16 16k;
        fastcgi_buffer_size 32k;
    }

    location ~ /\.ht {
        deny all;
    }
}