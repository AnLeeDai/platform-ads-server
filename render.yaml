services:
  - type: web
    name: platform-ads-server
    env: docker
    branch: main
    plan: starter
    dockerfilePath: ./Dockerfile
    # startCommand is not required because the Dockerfile CMD is used
    envVars:
      - key: APP_ENV
        value: production
      - key: APP_DEBUG
        value: 'false'
    # For secrets (APP_KEY, DB_PASSWORD, etc.) set them in the Render dashboard under the service's "Environment" -> "Secrets".
